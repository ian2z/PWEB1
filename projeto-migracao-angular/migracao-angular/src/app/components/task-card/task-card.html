<div class="p-3 border rounded bg-white shadow-sm cursor-move opacity-100 transition-opacity" 
     draggable="true"
     (dragstart)="onDragStart($event)">
<div class="p-3 border rounded bg-white shadow-sm cursor-move opacity-100 transition-opacity" draggable="true">
  <div class="flex items-start justify-between gap-2">
    <div class="flex items-center gap-3">
      
      <span class="dot" [ngClass]="proximityColor" title="Proximidade"></span>
      
      <div>
        <div class="font-semibold text-slate-800">{{ task.title }}</div>
        <div class="text-xs text-slate-500">Término: {{ task.due }} • {{ levelLabel }}</div>
      </div>
    </div>
    
    <div class="text-right">
      <button class="text-xs text-slate-500 mr-2 hover:underline" (click)="onEdit()">Editar</button>
      <button class="text-xs text-red-500 hover:underline" (click)="onDelete()">Excluir</button>
    </div>
  </div>

  @if (task.desc) {
    <p class="mt-2 text-sm text-slate-600">{{ task.desc }}</p>
  }
</div>
